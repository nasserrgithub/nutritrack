<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriTrack Admin</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f5f5f5; }
        nav { background: #1a1a2e; color: white; padding: 1rem 2rem; display: flex; gap: 2rem; align-items: center; }
        nav a { color: white; text-decoration: none; font-size: 14px; }
        nav a:hover { text-decoration: underline; }
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #e0e0e0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #e0e0e0; font-size: 14px; }
        th { background: #f8f8f8; font-weight: 500; }
        .stat { font-size: 32px; font-weight: 600; color: #1a1a2e; }
        .stat-label { font-size: 13px; color: #666; margin-top: 4px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <nav>
        <strong>NutriTrack Admin</strong>
        <a href="/admin/">Dashboard</a>
        <a href="/admin/users">Users</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
