{% extends "admin/base.html" %}

{% block content %}
<h2>Dashboard</h2>

<div class="grid">
    <div class="card">
        <div class="stat">{{ user_count }}</div>
        <div class="stat-label">Total users</div>
    </div>
    <div class="card">
        <div class="stat">{{ food_count }}</div>
        <div class="stat-label">Foods in database</div>

        <div class="stat">{{ entry_count }}</div>
        <div class="stat-label">Food entries logged</div>
    </div>
</div>
{% endblock %}
